<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BenchLLAMA</title>
<style>
  /* ── Orange/cream theme (dark default; light is the same hues, pastel) ────── */
  :root, html[data-theme="dark"] {
    --bg:#17130f; --surface:#1f1a14; --panel:#29221a; --border:#3a3025;
    --text:#f2e8d8; --dim:#a99a85; --accent:#ff8c42; --accent-soft:rgba(255,140,66,.16);
    --green:#8bbf6b; --red:#e8674c; --yellow:#e8b04a;
  }
  html[data-theme="light"] {
    --bg:#fbf5ea; --surface:#fffaf2; --panel:#f4ead8; --border:#e7d9c3;
    --text:#3b322a; --dim:#8f8270; --accent:#d9772a; --accent-soft:rgba(217,119,42,.12);
    --green:#5f9a48; --red:#c8503a; --yellow:#bf8a2c;
  }
  @media (prefers-color-scheme: light) {
    html[data-theme="system"] {
      --bg:#fbf5ea; --surface:#fffaf2; --panel:#f4ead8; --border:#e7d9c3;
      --text:#3b322a; --dim:#8f8270; --accent:#d9772a; --accent-soft:rgba(217,119,42,.12);
      --green:#5f9a48; --red:#c8503a; --yellow:#bf8a2c;
    }
  }
  * { box-sizing:border-box; }
  body {
    margin:0; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column;
    font-family:"Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-size:14px; line-height:1.5;
  }
  header {
    display:flex; align-items:center; gap:16px; padding:10px 18px;
    background:var(--surface); border-bottom:1px solid var(--border);
  }
  .brand { font-weight:600; letter-spacing:-.025em; font-size:16px; }
  .brand b { color:var(--accent); }
  .spacer { flex:1; }
  .timer { font-family:var(--mono,"Geist Mono",ui-monospace,monospace); color:var(--dim); }
  #status { display:flex; align-items:center; gap:12px; }
  .statusrow { display:inline-flex; align-items:center; gap:10px; }
  #themecycle { display:none; background:none; border:1px solid var(--border); color:var(--accent);
    cursor:pointer; padding:3px 9px; font-size:14px; border-radius:6px; }
  .badge { padding:2px 10px; border-radius:999px; font-size:12px; font-weight:600; }
  .badge.run { background:var(--accent-soft); color:var(--accent); }
  .badge.done { background:rgba(139,191,107,.18); color:var(--green); }
  .badge.stop { background:rgba(214,93,71,.18); color:var(--red); }
  .themetog button {
    background:none; border:1px solid var(--border); color:var(--dim); cursor:pointer;
    padding:3px 8px; font-size:12px; border-radius:6px;
  }
  .themetog button[aria-pressed="true"] { color:var(--accent); border-color:var(--accent); }
  main { flex:1; display:flex; min-height:0; }
  .left { width:340px; padding:16px; overflow-y:auto; border-right:1px solid var(--border); background:var(--surface); }
  .right { flex:1; min-width:0; display:flex; flex-direction:column; }
  h2 { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--dim); margin:18px 0 8px; }
  h2:first-child { margin-top:0; }
  .phase, .model { display:flex; align-items:center; gap:8px; padding:3px 0; }
  .dot { width:1.1em; text-align:center; flex:none; }
  .phase.cur { color:var(--accent); font-weight:600; }
  .model.off { opacity:.4; }
  .model.run .name { font-weight:600; }
  .name { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .meta { color:var(--dim); font-size:12px; font-family:var(--mono,"Geist Mono",ui-monospace,monospace); }
  .role { font-size:10px; padding:0 5px; border-radius:4px; background:var(--panel); color:var(--dim); margin-left:4px; }
  .count { color:var(--dim); font-size:12px; margin-top:10px; }
  /* ── model cards ── */
  #models { display:flex; flex-direction:column; gap:8px; margin-top:6px; }
  .card { background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--border); border-radius:8px; padding:8px 10px; }
  .card.off { opacity:.45; }
  .card.run { border-left-color:var(--accent); }
  .card.s-done { border-left-color:var(--green); } .card.s-error { border-left-color:var(--red); } .card.s-skip { border-left-color:var(--dim); }
  .card-top { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .cname { font-family:var(--mono,"Geist Mono",ui-monospace,monospace); font-size:13px; font-weight:600;
           overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cname .cdot { font-size:10px; margin-right:4px; }
  .ctps { font-family:var(--mono,"Geist Mono",ui-monospace,monospace); font-size:11px; color:var(--dim); flex:none; }
  .cbadge { display:inline-block; font-size:10px; font-weight:600; letter-spacing:.04em; color:var(--accent);
            background:var(--accent-soft); border-radius:4px; padding:1px 7px; margin-top:6px; }
  .ctags { display:flex; flex-wrap:wrap; gap:4px; margin-top:7px; }
  .ctag { font-size:9px; text-transform:uppercase; letter-spacing:.04em; color:var(--dim); background:var(--bg);
          border:1px solid var(--border); border-radius:3px; padding:1px 5px; }
  #roNote { color:var(--dim); font-size:13px; padding:10px 2px; }
  #roNote code { background:var(--panel); padding:1px 5px; border-radius:4px; }
  .s-pending{color:var(--dim);} .s-running{color:var(--accent);} .s-done{color:var(--green);}
  .s-error{color:var(--red);} .s-skip{color:var(--dim);}
  .run .dot { animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 50%{opacity:.35;} }
  #log {
    flex:1; margin:0; padding:12px 16px; overflow-y:auto; white-space:pre-wrap; word-break:break-word;
    font-family:var(--mono,"Geist Mono",ui-monospace,monospace); font-size:12.5px; color:var(--text);
  }
  .logphase { color:var(--accent); }
  .conn { padding:4px 16px; font-size:11px; color:var(--dim); border-top:1px solid var(--border); background:var(--surface); }
  .conn.down { color:var(--red); }
  .hidden { display:none !important; }
  #selector { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
  #selector label { font-size:12px; color:var(--dim); display:flex; flex-direction:column; gap:3px; }
  #selector select, #selector input[type=text] {
    background:var(--bg); color:var(--text); border:1px solid var(--border);
    border-radius:6px; padding:6px 8px; font:inherit; font-size:13px;
  }
  .checks { display:flex; gap:16px; }
  .checks label { flex-direction:row !important; align-items:center; gap:5px; color:var(--text); font-size:13px; }
  /* ── model multi-select ── */
  .modelsField { display:flex; flex-direction:column; gap:4px; }
  .mf-head { font-size:12px; color:var(--dim); display:flex; align-items:center; gap:8px; }
  .mf-clear { margin-left:auto; background:none; border:1px solid var(--border); color:var(--dim);
    border-radius:5px; padding:1px 8px; font:inherit; font-size:11px; cursor:pointer; }
  .mf-clear:hover { color:var(--text); border-color:var(--accent); }
  .modelpick { max-height:172px; overflow-y:auto; border:1px solid var(--border);
    border-radius:6px; padding:4px; background:var(--bg); }
  .mp-row { display:flex !important; flex-direction:row !important; align-items:center; gap:7px;
    padding:3px 5px; border-radius:5px; font-size:12.5px; color:var(--text); cursor:pointer; }
  .mp-row:hover { background:var(--accent-soft); }
  .mp-name { flex:1; font-family:var(--mono,"Geist Mono",ui-monospace,monospace); }
  .mp-tag { font-size:10.5px; color:var(--dim); background:var(--panel); border:1px solid var(--border);
    border-radius:999px; padding:0 7px; }
  .btn { background:var(--accent); color:#241606; border:none; border-radius:7px; padding:9px 14px;
         font:inherit; font-weight:600; cursor:pointer; }
  .btn:hover { filter:brightness(1.08); }
  .btn.stop { background:var(--red); color:#fff; padding:4px 12px; font-size:12px; font-weight:600; }
  /* ── tabs + views ── */
  nav#tabs { display:flex; gap:4px; padding:6px 14px; background:var(--surface); border-bottom:1px solid var(--border); }
  nav#tabs button { background:none; border:none; color:var(--dim); cursor:pointer; padding:5px 12px; border-radius:6px; font:inherit; font-size:13px; }
  nav#tabs button[aria-pressed="true"] { color:var(--accent); background:var(--accent-soft); font-weight:600; }
  .view { flex:1; min-height:0; display:flex; }
  #view-rankings { display:block; padding:18px 22px; overflow-y:auto; }
  #view-rankings h3 { margin:22px 0 6px; font-size:14px; color:var(--accent); }
  table.rank { width:100%; border-collapse:collapse; margin:4px 0 12px; font-size:13px; }
  table.rank th { text-align:left; color:var(--dim); font-weight:500; font-size:11px; text-transform:uppercase;
                  letter-spacing:.05em; padding:4px 10px; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; }
  table.rank td { padding:5px 10px; border-bottom:1px solid var(--border); }
  table.rank td.rk { color:var(--dim); width:2em; } table.rank td.nm { font-family:var(--mono,"Geist Mono",ui-monospace,monospace); }
  td.bar { position:relative; } td.bar span { position:absolute; left:0; top:50%; transform:translateY(-50%);
            height:62%; background:var(--accent-soft); border-radius:3px; z-index:0; }
  td.bar i { position:relative; font-style:normal; }
  #view-files { display:flex; }
  #filesList { width:300px; overflow-y:auto; border-right:1px solid var(--border); padding:10px; }
  .fitem { padding:5px 8px; border-radius:5px; cursor:pointer; display:flex; justify-content:space-between; gap:8px; font-size:12.5px; }
  .fitem:hover { background:var(--panel); } .fitem.sel { background:var(--accent-soft); color:var(--accent); }
  #fileView { flex:1; margin:0; padding:14px 18px; overflow:auto; white-space:pre-wrap; word-break:break-word;
              font-family:var(--mono,"Geist Mono",ui-monospace,monospace); font-size:12.5px; }

  /* ── mobile / narrow screens: monitor-only, 75/25 sidebar/log ─────────────── */
  @media (max-width: 700px) {
    header { gap:10px; padding:8px 12px; }
    .brand { font-size:15px; }
    nav#tabs { display:none; }                 /* monitor only */
    #themetog { display:none; }                 /* collapse 3 buttons → 1 cycle button */
    #themecycle { display:inline-flex; align-items:center; }
    /* suite/stage name + timer as a small card (name top, timer bottom) */
    #status { flex-direction:column; align-items:flex-end; gap:1px; line-height:1.25;
      background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:4px 10px; }
    #status #phaseLabel { font-size:11px; max-width:42vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .statusrow { gap:8px; }
    #stopBtn .bt { display:none; }              /* icon-only stop (only shown with --allow-control) */

    /* sidebar takes most of the screen, log below — 75 / 25 */
    #view-monitor { flex-direction:column; }
    .left { width:auto; flex:3 1 0; min-height:0; padding:12px 14px;
      border-right:none; border-bottom:1px solid var(--border); }
    .right { flex:1 1 0; min-height:0; }
    #log { padding:10px 14px; font-size:12px; }

    /* no selection screen on mobile — pipeline + models list always visible */
    #selector, #roNote { display:none !important; }
    #monitorPanels { display:block !important; }

    /* compress model cards to 2 lines: [icon name … tps] / [role] */
    .card { padding:6px 9px; }
    .cbadge { margin-top:3px; }
    .ctags { display:none; }                    /* hide capability tags on mobile */
  }
</style>
</head>
<body>
  <header>
    <span class="brand">Bench<b>LLAMA</b></span>
    <span class="spacer"></span>
    <div id="status">
      <span id="phaseLabel" class="meta"></span>
      <span class="statusrow"><span id="badge"></span><span class="timer" id="timer">00:00:00</span></span>
    </div>
    <button id="stopBtn" class="btn stop hidden">■<span class="bt"> Stop</span></button>
    <span class="themetog" id="themetog">
      <button data-set="light" aria-pressed="false">☀</button>
      <button data-set="system" aria-pressed="true">◐</button>
      <button data-set="dark" aria-pressed="false">☾</button>
    </span>
    <button id="themecycle" title="cycle theme">◐</button>
  </header>
  <nav id="tabs">
    <button data-tab="monitor" aria-pressed="true">Monitor</button>
    <button data-tab="rankings" aria-pressed="false">Rankings</button>
    <button data-tab="files" aria-pressed="false">Files</button>
  </nav>
  <main>
    <section id="view-monitor" class="view">
    <div class="left">
      <form id="selector">
        <h2>New run</h2>
        <label>Suite
          <select id="cmd">
            <option value="all">ALL (full pipeline)</option>
            <option value="standard">Standard Suite</option>
            <option value="ladder">Ladder (CTX)</option>
            <option value="batteries">Aptitude (All Batteries)</option>
            <option value="aptitude">Aptitude (Single Battery)</option>
            <option value="vision">Vision</option>
            <option value="embedding">Embedding</option>
            <option value="update">Update Registry</option>
          </select>
        </label>
        <label id="batWrap" class="hidden">Battery
          <select id="battery">
            <option value="B">B — worker chat</option>
            <option value="A">A — router</option>
            <option value="C">C — research</option>
            <option value="D">D — tool-heavy</option>
            <option value="E">E — coding (3-run avg)</option>
            <option value="F">F — consistency (3-run avg)</option>
          </select>
        </label>
        <div class="checks">
          <label><input type="checkbox" id="fast"> fast</label>
          <label><input type="checkbox" id="force"> force</label>
        </div>
        <div class="modelsField">
          <div class="mf-head">Models <span class="meta">— none = all eligible</span>
            <button type="button" id="mfClear" class="mf-clear">clear</button></div>
          <div id="modelpick" class="modelpick"><span class="meta">loading…</span></div>
        </div>
        <button type="submit" class="btn" id="startBtn">▶ Start</button>
        <div id="startMsg" class="meta"></div>
      </form>
      <div id="roNote" class="hidden">Read-only (LAN). Start a run from the host, or relaunch with <code>--allow-control</code>.</div>
      <div id="monitorPanels" class="hidden">
        <div id="pipeline"></div>
        <h2>Models <span id="modelcount" class="count"></span></h2>
        <div id="models"></div>
      </div>
    </div>
    <div class="right">
      <pre id="log"></pre>
      <div class="conn" id="conn">connecting…</div>
    </div>
    </section>
    <section id="view-rankings" class="view hidden"><div id="rankings"></div></section>
    <section id="view-files" class="view hidden">
      <div id="filesList"></div>
      <pre id="fileView">select a result file…</pre>
    </section>
  </main>

<script>
const ICON = {pending:"○", running:"●", done:"✓", error:"✗", skip:"↷"};
const $ = s => document.querySelector(s);

// ── theme ───────────────────────────────────────────────────────────────────
const html = document.documentElement;
const THEME_ICON = {light:"☀", system:"◐", dark:"☾"};
const THEME_ORDER = ["system", "light", "dark"];
function setTheme(t){ html.dataset.theme=t; localStorage.bench_theme=t;
  document.querySelectorAll("#themetog button").forEach(b=>b.setAttribute("aria-pressed", b.dataset.set===t));
  const c=$("#themecycle"); if(c){ c.textContent=THEME_ICON[t]||"◐"; c.title="theme: "+t; } }
document.querySelectorAll("#themetog button").forEach(b=>b.onclick=()=>setTheme(b.dataset.set));
$("#themecycle").onclick = ()=>{ const cur=html.dataset.theme||"system";
  setTheme(THEME_ORDER[(THEME_ORDER.indexOf(cur)+1) % THEME_ORDER.length]); };
setTheme(localStorage.bench_theme || "system");

// ── render ──────────────────────────────────────────────────────────────────
function fmtElapsed(s){ const h=String((s/3600|0)).padStart(2,"0"),
  m=String((s%3600/60|0)).padStart(2,"0"), x=String(s%60).padStart(2,"0"); return `${h}:${m}:${x}`; }

function render(snap){
  $("#timer").textContent = fmtElapsed(snap.elapsed||0);
  $("#phaseLabel").textContent = snap.phase_label || "";
  const badge = $("#badge");
  badge.className = snap.aborted ? "badge stop" : (snap.finished ? "badge done" : "badge run");
  badge.textContent = snap.aborted ? "■ STOPPED"
    : snap.finished ? "✓ DONE"
    : (snap.pause_remaining>0 ? `next in ${snap.pause_remaining}s` : "running");

  // pipeline (only if >1 phase)
  const pipe = $("#pipeline");
  if (snap.phases.length > 1) {
    pipe.innerHTML = "<h2>Pipeline</h2>" + snap.phases.map((p,i)=>{
      const cur = (i===snap.current_phase && p.status==="running");
      return `<div class="phase ${cur?'cur':''} ${p.status==='running'?'run':''}">
        <span class="dot s-${p.status}">${ICON[p.status]}</span><span class="name">${esc(p.label)}</span></div>`;
    }).join("");
  } else { pipe.innerHTML = ""; }

  // models
  renderModels(snap.models, snap.last_tps);
}

function modelCard(m, lastTps){
  const run = m.status==="running";
  const tps = run && lastTps ? lastTps : m.tps;
  const ext = (m.extended_roles||[]).map(r=>r.toUpperCase()).join(", ");
  const badge = m.role ? `<div class="cbadge">${esc(m.role.toUpperCase())}${ext?": "+esc(ext):""}</div>` : "";
  const tags = (m.caps||[]).map(c=>`<span class="ctag">${esc(c)}</span>`).join("");
  return `<div class="card ${m.active?'':'off'} ${run?'run':''} s-${m.status}">
    <div class="card-top">
      <span class="cname"><span class="cdot s-${m.status}">${ICON[m.status]}</span>${esc(m.name)}</span>
      <span class="ctps">${tps!=null?Math.round(tps)+'t/s':''}</span>
    </div>
    ${badge}
    ${tags?`<div class="ctags">${tags}</div>`:""}
  </div>`;
}
function renderModels(models, lastTps){
  const done = models.filter(m=>["done","skip","error"].includes(m.status)).length;
  $("#modelcount").textContent = models.length ? `${done}/${models.length}` : "";
  $("#models").innerHTML = models.map(m=>modelCard(m, lastTps)).join("");
}

// idle (no active run): show the candidate model list so the mobile sidebar isn't empty
let CANDIDATES = null;
async function showIdleCandidates(){
  if(CANDIDATES===null){ try { CANDIDATES = await (await fetch("/api/models")).json(); } catch { CANDIDATES = []; } }
  $("#pipeline").innerHTML = "";
  renderModels(CANDIDATES.map(m=>({name:m.name, role:m.role, tps:null, status:"pending",
    active:true, caps:m.caps, extended_roles:m.extended_roles})), null);
}

function esc(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

// ── log (append diffs, autoscroll if near bottom, cap DOM) ────────────────────
const logEl = $("#log");
function appendLog(lines){
  if(!lines || !lines.length) return;
  const nearBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 60;
  const frag = document.createDocumentFragment();
  for(const ln of lines){
    const div = document.createElement("div");
    if(ln.includes("▶")) div.className="logphase";
    div.textContent = ln;
    frag.appendChild(div);
  }
  logEl.appendChild(frag);
  while(logEl.childNodes.length > 2500) logEl.removeChild(logEl.firstChild);
  if(nearBottom) logEl.scrollTop = logEl.scrollHeight;
}

// ── view state (idle → selector · active → monitor · finished → both) ─────────
let READONLY = false;
function show(el, on){ $(el).classList.toggle("hidden", !on); }
function setView({idle, finished}){
  show("#selector", !READONLY && (idle || finished));
  show("#monitorPanels", !idle);
  show("#stopBtn", !READONLY && !idle && !finished);
  show("#roNote", READONLY && idle);
}

// ── controls ──────────────────────────────────────────────────────────────────
$("#cmd").onchange = e => show("#batWrap", e.target.value === "aptitude");

// model multi-select (populated from /api/models)
async function loadModelPicker(){
  const box = $("#modelpick");
  try {
    const ms = await (await fetch("/api/models")).json();
    if(!ms.length){ box.innerHTML = '<span class="meta">no models registered</span>'; return; }
    box.innerHTML = ms.map(m=>{
      const ext = (m.extended_roles||[]).join(",");
      const tag = [m.role, ext].filter(Boolean).join(":");
      return `<label class="mp-row"><input type="checkbox" value="${esc(m.name)}">
        <span class="mp-name">${esc(m.name)}</span>${tag?`<span class="mp-tag">${esc(tag)}</span>`:""}</label>`;
    }).join("");
  } catch { box.innerHTML = '<span class="meta">could not load models</span>'; }
}
loadModelPicker();
$("#mfClear").onclick = ()=> document.querySelectorAll("#modelpick input:checked").forEach(c=>c.checked=false);

$("#selector").onsubmit = async e => {
  e.preventDefault();
  const picked = [...document.querySelectorAll("#modelpick input:checked")].map(c=>c.value).join(" ");
  const body = {
    cmd: $("#cmd").value, battery: $("#battery").value,
    fast: $("#fast").checked, force: $("#force").checked, models: picked,
  };
  $("#startMsg").textContent = "starting…";
  try {
    const r = await fetch("/api/start", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
    const d = await r.json();
    $("#startMsg").textContent = d.ok ? "" : ("⚠ " + d.msg);
  } catch(err){ $("#startMsg").textContent = "⚠ " + err; }
};
$("#stopBtn").onclick = ()=> fetch("/api/stop", {method:"POST"});

// ── tabs ──────────────────────────────────────────────────────────────────────
$("#tabs").onclick = e => {
  const b = e.target.closest("[data-tab]"); if(!b) return;
  document.querySelectorAll("#tabs button").forEach(x=>x.setAttribute("aria-pressed", x===b));
  document.querySelectorAll(".view").forEach(v=>v.classList.add("hidden"));
  $("#view-"+b.dataset.tab).classList.remove("hidden");
  if(b.dataset.tab==="rankings") loadRankings();
  if(b.dataset.tab==="files") loadFiles();
};

// ── rankings viewer ─────────────────────────────────────────────────────────
const f2 = v => v==null ? "—" : Number(v).toFixed(2);
const f3 = v => v==null ? "—" : Number(v).toFixed(3);
const f0 = v => v==null ? "—" : Math.round(v);
function table(title, names, by, cols){
  const rows = (names||[]).map(n=>by[n]).filter(Boolean);
  if(!rows.length) return "";
  const maxes = cols.map(c=> c.bar ? Math.max(...rows.map(r=>c.get(r)||0), 1e-6) : 0);
  let h = `<h3>${esc(title)} <span class="meta">(${rows.length})</span></h3><table class="rank"><thead><tr><th>#</th><th>model</th>`;
  cols.forEach(c=> h+=`<th>${esc(c.h)}</th>`); h+="</tr></thead><tbody>";
  rows.forEach((r,i)=>{
    h += `<tr><td class="rk">${i+1}</td><td class="nm">${esc(r.name)}</td>`;
    cols.forEach((c,ci)=>{
      const v=c.get(r), disp=c.fmt?c.fmt(v):(v==null?"—":v);
      h += (c.bar && v!=null)
        ? `<td class="bar"><span style="width:${Math.round(100*v/maxes[ci])}%"></span><i>${disp}</i></td>`
        : `<td>${disp}</td>`;
    });
    h+="</tr>";
  });
  return h+"</tbody></table>";
}
function sortable(tbl){
  tbl.querySelectorAll("th").forEach((th,idx)=>{ let asc=true; th.onclick=()=>{
    const tb=tbl.tBodies[0], rows=[...tb.rows];
    rows.sort((a,b)=>{ const av=a.cells[idx].innerText.replace("—","").trim(), bv=b.cells[idx].innerText.replace("—","").trim();
      const an=parseFloat(av), bn=parseFloat(bv);
      const c=(!isNaN(an)&&!isNaN(bn))?an-bn:av.localeCompare(bv); return asc?c:-c; });
    asc=!asc; rows.forEach(r=>tb.appendChild(r)); }; });
}
async function loadRankings(){
  const box=$("#rankings");
  const r=await fetch("/api/rankings");
  if(!r.ok){ box.innerHTML="<p class='meta'>No rankings yet — run a benchmark, then export.py.</p>"; return; }
  const d=await r.json(), by={}; d.models.forEach(m=>by[m.name]=m);
  const rk=d.rankings||{};
  const gen=d.generated?new Date(d.generated).toLocaleString():"";
  const std=r=>r.standard||{};
  let html=`<p class="meta">source ${esc(d.source||'')} · ${esc(gen)} · ${d.models.length} models</p>`;
  html+=table("Coding", rk.coders, by, [
    {h:"comp",get:r=>(r.coding||{}).composite,fmt:f3,bar:true},
    {h:"σ",get:r=>(r.coding||{}).composite_stdev,fmt:f3},
    {h:"Q/GB",get:r=>(r.coding||{}).quality_per_gb,fmt:f3,bar:true},
    {h:"t/s",get:r=>r.tps,fmt:f0},{h:"GB",get:r=>r.disk_gb,fmt:f2}]);
  html+=table("Consistency", rk.coders && d.models.some(m=>m.consistency)?Object.keys(by).filter(n=>by[n].consistency):[], by, [
    {h:"comp",get:r=>(r.consistency||{}).composite,fmt:f3,bar:true},
    {h:"σ",get:r=>(r.consistency||{}).composite_stdev,fmt:f3},{h:"t/s",get:r=>r.tps,fmt:f0}]);
  html+=table("Workers (chat)", rk.workers, by, [
    {h:"reason",get:r=>std(r).reasoning,fmt:v=>v==null?"—":v+"/4"},
    {h:"instr",get:r=>std(r).instr,fmt:v=>v==null?"—":v+"/2"},
    {h:"tool",get:r=>std(r).tool,fmt:v=>v?"✓":"✗"},
    {h:"t/s",get:r=>r.tps,fmt:f0,bar:true},{h:"GB",get:r=>r.disk_gb,fmt:f2}]);
  html+=table("Routers", rk.routers, by, [{h:"t/s",get:r=>r.tps,fmt:f0,bar:true},{h:"GB",get:r=>r.disk_gb,fmt:f2}]);
  html+=table("Vision", rk.vision, by, [{h:"comp",get:r=>(r.vision||{}).composite,fmt:f3,bar:true},{h:"t/s",get:r=>r.tps,fmt:f0},{h:"GB",get:r=>r.disk_gb,fmt:f2}]);
  html+=table("Embedding — long-doc", rk.embedding_long, by, [{h:"long",get:r=>(r.embedding||{}).composite_long,fmt:f3,bar:true},{h:"short",get:r=>(r.embedding||{}).composite,fmt:f3},{h:"GB",get:r=>r.disk_gb,fmt:f2}]);
  box.innerHTML=html;
  box.querySelectorAll("table.rank").forEach(sortable);
}

// ── files browser ─────────────────────────────────────────────────────────────
async function loadFiles(){
  const files=await (await fetch("/api/results")).json();
  $("#filesList").innerHTML = files.length
    ? files.map(f=>`<div class="fitem" data-f="${esc(f.name)}"><span>${esc(f.name)}</span><span class="meta">${(f.size/1024).toFixed(0)}k</span></div>`).join("")
    : "<p class='meta'>no result files yet</p>";
}
$("#filesList").onclick = async e=>{
  const it=e.target.closest(".fitem"); if(!it) return;
  $("#filesList").querySelectorAll(".fitem").forEach(x=>x.classList.remove("sel")); it.classList.add("sel");
  $("#fileView").textContent = await (await fetch("/api/results/"+encodeURIComponent(it.dataset.f))).text();
};

// ── websocket (auto-reconnect) ────────────────────────────────────────────────
function connect(){
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = ()=>{ $("#conn").className="conn"; $("#conn").textContent="● live"; };
  ws.onmessage = e=>{
    const d = JSON.parse(e.data);
    if("read_only" in d) READONLY = d.read_only;
    if(d.idle){
      setView({idle:true, finished:false});
      $("#phaseLabel").textContent = "no active run";
      $("#badge").textContent = ""; $("#badge").className = "badge";
      $("#timer").textContent = "00:00:00";
      showIdleCandidates();
      return;
    }
    render(d.snapshot); appendLog(d.log);
    setView({idle:false, finished:d.snapshot.finished});
  };
  ws.onclose = ()=>{ $("#conn").className="conn down"; $("#conn").textContent="○ disconnected — retrying…"; setTimeout(connect, 1500); };
  ws.onerror = ()=>ws.close();
}
connect();
</script>
